name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.10"

      - name: Set up Python
        run: uv python install 3.14.3

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint with ruff
        run: uv run --group dev ruff check .

      - name: Run tests
        run: uv run python manage.py test tracker --verbosity=2
